<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Salud CR</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <div class="nav-brand">
        <img th:src="@{/logo.jpeg}" alt="Logo">
        <span>Clínica <em>Salud CR</em></span>
    </div>
    <span id="bienvenida"></span>
    <button onclick="logout()">Cerrar sesión</button>
</nav>

<div class="container">
    <h2>Inicio</h2>
    <div class="home-card">
        <p>Bienvenido al sistema de gestión de citas médicas de Clínica Salud CR.</p>
        <p>Desde aquí podrás consultar y gestionar tus citas médicas.</p>
    </div>
</div>

<script>
    const token = sessionStorage.getItem('token');
    const username = sessionStorage.getItem('username');

    if (!token) {
        window.location.href = '/login';
    }

    document.getElementById('bienvenida').textContent = 'Hola, ' + username;

    function logout() {
        sessionStorage.clear();
        window.location.href = '/login';
    }
</script>

</body>
</html>
